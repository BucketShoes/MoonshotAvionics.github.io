; Moonshot Avionics — PlatformIO configuration
; Two environments: rocket (COM13) and base_station (COM9).
;
; Common workflows:
;   Upload firmware:        pio run -e rocket -t upload
;                           pio run -e base_station -t upload
;   Upload LittleFS only:   pio run -e base_station -t uploadfs
;   Build only (get .bin):  pio run -e rocket
;                           pio run -e base_station
;   Serial monitor:         pio device monitor -e rocket
;                           pio device monitor -e base_station
;
; Firmware .bin locations after build:
;   .pio/build/rocket/firmware.bin
;   .pio/build/base_station/firmware.bin
;
; LittleFS workflow:
;   1. .\base_station\compress_web.ps1    (compress docs/ -> base_station/data/)
;   2. pio run -e base_station -t uploadfs

[platformio]
; No default_envs — always specify explicitly to avoid accidental uploads to wrong board.
; Both boards are Heltec Wireless Tracker V1.1 (ESP32-S3, 8MB flash, no PSRAM).
;
; src_dir points to the repo root so build_src_filter can select either sketch folder.
src_dir = .
; data_dir for LittleFS upload (base_station env only).
data_dir = base_station/data

; ===================== SHARED SETTINGS =====================
[env]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
framework = arduino

; Custom board definition in boards/heltec_wireless_tracker.json.
; The variant (variants/heltec_wireless_tracker/pins_arduino.h in the PIO
; framework packages) defines no pin aliases — LED_BUILTIN, SS, MOSI etc.
; do not exist and will cause a compile error if used. All pin assignments
; live in config.h.
board = heltec_wireless_tracker

; Arduino IDE uses gnu++17 by default for ESP32; PIO defaults to gnu++11.
; build_unflags removes the default so build_flags can set gnu++17.
build_unflags = -std=gnu++11
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17

board_build.flash_mode = qio
board_upload.flash_size = 8MB

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ===================== ROCKET (COM13) =====================
[env:rocket]
; Include only rocket_avionics/ source files.
; The .ino has #include <Arduino.h> so PIO compiles it as a regular C++ file.
build_src_filter = -<*> +<rocket_avionics/>
board_build.partitions = rocket_avionics/partitions.csv
upload_port = COM13
monitor_port = COM13

lib_deps =
    jgromes/RadioLib @ ^7.1.2
    Wire
    Preferences
    h2zero/NimBLE-Arduino @ ^2.3.1

; ===================== BASE STATION (COM9) =====================
[env:base_station]
build_src_filter = -<*> +<base_station/>
board_build.partitions = base_station/partitions.csv
board_build.filesystem = littlefs
upload_port = COM9
monitor_port = COM9

lib_deps =
    jgromes/RadioLib @ ^7.1.2
    esp32async/ESPAsyncWebServer @ ^3.10.3
    h2zero/NimBLE-Arduino @ ^2.3.1
