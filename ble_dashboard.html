<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 BLE Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
    p.sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 2rem; }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1rem;
    }
    .card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 1rem; }

    /* Status badge */
    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      background: #1a1f2e;
      border: 1px solid #2d3148;
      margin-bottom: 1.5rem;
      transition: background 0.3s, border-color 0.3s;
    }
    #status-badge.connected    { background: #0f2820; border-color: #1d6b48; color: #4ade80; }
    #status-badge.disconnected { color: #94a3b8; }
    #status-badge.scanning     { color: #60a5fa; border-color: #1e3a5f; background: #0c1a30; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: currentColor;
      animation: none;
    }
    .connected .dot  { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* Big counter */
    #counter-display {
      font-size: 4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: #818cf8;
      margin-bottom: 0.5rem;
    }
    #counter-label { font-size: 0.8rem; color: #64748b; }

    /* Device info */
    .info-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 0.4rem 0; border-bottom: 1px solid #2d3148; }
    .info-row:last-child { border-bottom: none; }
    .info-row span:first-child { color: #64748b; }
    .info-row span:last-child  { color: #e2e8f0; font-family: monospace; font-size: 0.8rem; text-align: right; max-width: 65%; word-break: break-all; }

    /* Controls */
    label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 0.4rem; }
    .row { display: flex; gap: 0.75rem; align-items: flex-end; }
    input[type=number] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.55rem 0.75rem;
    }
    input[type=number]:focus { outline: none; border-color: #6366f1; }

    button {
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-connect    { background: #6366f1; color: #fff; width: 100%; padding: 0.75rem; font-size: 0.95rem; border-radius: 10px; margin-bottom: 1rem; }
    #btn-connect.active { background: #dc2626; }
    #btn-send       { background: #334155; color: #e2e8f0; }

    #log {
      background: #0a0d14;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.75rem;
      color: #64748b;
      height: 140px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
    }
    #log .entry { padding: 1px 0; }
    #log .entry.info   { color: #60a5fa; }
    #log .entry.ok     { color: #4ade80; }
    #log .entry.warn   { color: #fbbf24; }
    #log .entry.data   { color: #a5b4fc; }
    #log .entry.error  { color: #f87171; }
  </style>
</head>
<body>

  <h1>ESP32 BLE Dashboard</h1>
  <p class="sub">Web Bluetooth · NimBLE GATT demo</p>

  <!-- Status -->
  <div id="status-badge" class="disconnected">
    <span class="dot"></span>
    <span id="status-text">Disconnected</span>
  </div>

  <!-- Connect button -->
  <div style="width:100%;max-width:480px">
    <button id="btn-connect" onclick="toggleConnection()">Connect to ESP32</button>
  </div>

  <!-- Counter -->
  <div class="card">
    <h2>Live counter (notifications)</h2>
    <div id="counter-display">–</div>
    <div id="counter-label">waiting for data…</div>
  </div>

  <!-- Device info -->
  <div class="card">
    <h2>Device info</h2>
    <div class="info-row"><span>Device name</span><span id="info-name">–</span></div>
    <div class="info-row"><span>Sensor service</span><span id="info-svc">4fafc201…</span></div>
    <div class="info-row"><span>Notify interval</span><span id="info-interval">1000 ms (default)</span></div>
  </div>

  <!-- Write config -->
  <div class="card">
    <h2>Set notify interval</h2>
    <label>New interval (ms, 100 – 60000)</label>
    <div class="row">
      <input type="number" id="interval-input" value="1000" min="100" max="60000" step="100" disabled>
      <button id="btn-send" onclick="sendInterval()" disabled>Send</button>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <h2>Log</h2>
    <div id="log"><div class="entry info">Ready. Click "Connect to ESP32".</div></div>
  </div>

<script>
// ── UUIDs – must match the .ino ───────────────────────────────────────────────
const SENSOR_SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const COUNTER_CHAR_UUID   = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
const CONFIG_CHAR_UUID    = 'beb5483e-36e1-4688-b7f5-ea07361b26a9';
const DEVINFO_SERVICE_UUID = 0x180a;
const DEVNAME_CHAR_UUID    = 0x2a00;

// ── State ─────────────────────────────────────────────────────────────────────
let bleDevice       = null;
let bleServer       = null;
let counterChar     = null;
let configChar      = null;
let notifyCount     = 0;

// ── Logging ───────────────────────────────────────────────────────────────────
function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `entry ${type}`;
  const ts = new Date().toLocaleTimeString();
  entry.textContent = `[${ts}] ${msg}`;
  el.prepend(entry);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(label, cls) {
  const badge = document.getElementById('status-badge');
  badge.className = cls;
  document.getElementById('status-text').textContent = label;
}

function setControlsEnabled(enabled) {
  document.getElementById('interval-input').disabled = !enabled;
  document.getElementById('btn-send').disabled = !enabled;
  const btn = document.getElementById('btn-connect');
  btn.textContent = enabled ? 'Disconnect' : 'Connect to ESP32';
  btn.classList.toggle('active', enabled);
}

// ── Connect / disconnect ──────────────────────────────────────────────────────
async function toggleConnection() {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
    return;
  }
  await connect();
}

async function connect() {
  if (!navigator.bluetooth) {
    log('Web Bluetooth not supported in this browser (use Chrome/Edge).', 'error');
    return;
  }

  try {
    setStatus('Scanning…', 'scanning');
    log('Requesting BLE device…');

    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SENSOR_SERVICE_UUID] }],
      optionalServices: [DEVINFO_SERVICE_UUID]
    });

    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
    log(`Pairing with "${bleDevice.name}"…`, 'info');

    bleServer = await bleDevice.gatt.connect();
    log('GATT connected.', 'ok');
    setStatus('Connected', 'connected');
    setControlsEnabled(true);

    // ── Read Device Name ──────────────────────────────────────────────────
    try {
      const diSvc   = await bleServer.getPrimaryService(DEVINFO_SERVICE_UUID);
      const nameChar = await diSvc.getCharacteristic(DEVNAME_CHAR_UUID);
      const nameVal  = await nameChar.readValue();
      const deviceName = new TextDecoder().decode(nameVal);
      document.getElementById('info-name').textContent = deviceName;
      log(`Device name: ${deviceName}`, 'ok');
    } catch (e) {
      log(`Could not read device name: ${e.message}`, 'warn');
    }

    // ── Sensor service ────────────────────────────────────────────────────
    const sensorSvc = await bleServer.getPrimaryService(SENSOR_SERVICE_UUID);

    // Subscribe to counter notifications
    counterChar = await sensorSvc.getCharacteristic(COUNTER_CHAR_UUID);
    counterChar.addEventListener('characteristicvaluechanged', onCounterNotify);
    await counterChar.startNotifications();
    log('Subscribed to counter notifications.', 'ok');

    // Get config char for writing
    configChar = await sensorSvc.getCharacteristic(CONFIG_CHAR_UUID);
    log('Config characteristic ready.', 'ok');

  } catch (err) {
    setStatus('Disconnected', 'disconnected');
    setControlsEnabled(false);
    log(`Connection failed: ${err.message}`, 'error');
  }
}

function onDisconnected() {
  log('Device disconnected.', 'warn');
  setStatus('Disconnected', 'disconnected');
  setControlsEnabled(false);
  document.getElementById('counter-display').textContent = '–';
  document.getElementById('counter-label').textContent = 'waiting for data…';
  notifyCount = 0;
  counterChar = null;
  configChar  = null;
}

// ── Notification handler ──────────────────────────────────────────────────────
function onCounterNotify(event) {
  const view = event.target.value;         // DataView
  const value = view.getUint32(0, true);   // little-endian uint32
  notifyCount++;
  document.getElementById('counter-display').textContent = value;
  document.getElementById('counter-label').textContent =
    `${notifyCount} notification${notifyCount !== 1 ? 's' : ''} received`;
  log(`Counter = ${value}`, 'data');
}

// ── Write interval ────────────────────────────────────────────────────────────
async function sendInterval() {
  if (!configChar) { log('Not connected.', 'warn'); return; }

  const ms = parseInt(document.getElementById('interval-input').value, 10);
  if (isNaN(ms) || ms < 100 || ms > 60000) {
    log('Interval must be 100–60000 ms.', 'warn');
    return;
  }

  // Pack as little-endian uint32
  const buf = new ArrayBuffer(4);
  new DataView(buf).setUint32(0, ms, true);

  try {
    await configChar.writeValueWithoutResponse(buf);
    document.getElementById('info-interval').textContent = `${ms} ms`;
    log(`Sent interval = ${ms} ms`, 'ok');
  } catch (e) {
    log(`Write failed: ${e.message}`, 'error');
  }
}
</script>
</body>
</html>
