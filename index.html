<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonshot Transport Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #2a2f3d;
    --text: #e0e4ed;
    --text-dim: #6b7280;
    --accent-ble: #3b82f6;
    --accent-usb: #10b981;
    --accent-warn: #f59e0b;
    --accent-err: #ef4444;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  header {
    text-align: center;
    padding: 1.5rem 0 1rem;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header h1 span.ble { color: var(--accent-ble); }
  header h1 span.usb { color: var(--accent-usb); }
  header p {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    max-width: 960px;
    margin: 0 auto;
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .card.ble { border-top: 3px solid var(--accent-ble); }
  .card.usb { border-top: 3px solid var(--accent-usb); }

  .card h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .card h2 .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .card h2 .dot.connected { background: var(--accent-usb); box-shadow: 0 0 6px var(--accent-usb); }

  .status-line {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    min-height: 1.2em;
  }

  button {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    border: none;
    border-radius: 6px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ble { background: var(--accent-ble); color: white; }
  .btn-ble:hover:not(:disabled) { background: #2563eb; }
  .btn-usb { background: var(--accent-usb); color: white; }
  .btn-usb:hover:not(:disabled) { background: #059669; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover:not(:disabled) { background: var(--surface2); }

  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }

  .bench-config {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .bench-config label { font-size: 0.8rem; color: var(--text-dim); }
  .bench-config select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 0.3rem 0.5rem;
  }

  .result-box {
    background: var(--surface2);
    border-radius: 6px;
    padding: 1rem;
    margin-top: 0.75rem;
    min-height: 60px;
  }
  .result-box .big-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }
  .result-box .big-number.ble { color: var(--accent-ble); }
  .result-box .big-number.usb { color: var(--accent-usb); }
  .result-box .unit { font-size: 0.85rem; color: var(--text-dim); margin-left: 0.25rem; }
  .result-box .detail {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 0.5rem;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: 0.5rem;
    overflow: hidden;
  }
  .progress-bar .fill { height: 100%; border-radius: 2px; transition: width 0.1s; width: 0%; }
  .progress-bar .fill.ble { background: var(--accent-ble); }
  .progress-bar .fill.usb { background: var(--accent-usb); }

  .log-panel { max-width: 960px; margin: 1rem auto 0; }
  .log-panel h3 {
    font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  #log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    line-height: 1.5;
    max-height: 200px;
    overflow-y: auto;
    color: var(--text-dim);
  }
  #log .log-ble { color: var(--accent-ble); }
  #log .log-usb { color: var(--accent-usb); }
  #log .log-err { color: var(--accent-err); }
  #log .log-warn { color: var(--accent-warn); }

  .api-badges { display: flex; gap: 0.5rem; justify-content: center; margin: 0.5rem 0 1rem; flex-wrap: wrap; }
  .badge {
    font-size: 0.7rem; font-family: 'JetBrains Mono', monospace;
    padding: 0.15rem 0.5rem; border-radius: 3px; border: 1px solid var(--border);
  }
  .badge.ok { border-color: var(--accent-usb); color: var(--accent-usb); }
  .badge.no { border-color: var(--accent-err); color: var(--accent-err); }

  .results-history { max-width: 960px; margin: 1rem auto 0; }
  .results-history h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
  .history-table {
    width: 100%; border-collapse: collapse;
    font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;
  }
  .history-table th, .history-table td {
    padding: 0.4rem 0.6rem; text-align: left; border-bottom: 1px solid var(--border);
  }
  .history-table th { color: var(--text-dim); font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>Moonshot <span class="ble">BLE</span> + <span class="usb">USB</span> Test</h1>
  <p>Transport throughput benchmarking for rocket avionics</p>
  <div class="api-badges" id="badges"></div>
</header>

<div class="grid">
  <!-- BLE Card -->
  <div class="card ble">
    <h2><span class="dot" id="ble-dot"></span> Bluetooth LE</h2>
    <div class="status-line" id="ble-status">Not connected</div>
    <div class="btn-row">
      <button class="btn-ble" id="ble-connect" onclick="bleConnect()">Connect</button>
      <button class="btn-outline" id="ble-disconnect" onclick="bleDisconnect()" disabled>Disconnect</button>
      <button class="btn-outline" id="ble-ping" onclick="blePing()" disabled>Ping</button>
      <button class="btn-outline" id="ble-info" onclick="bleInfo()" disabled>Info</button>
    </div>
    <div class="bench-config">
      <label>Duration:</label>
      <select id="ble-secs">
        <option value="3">3s</option>
        <option value="5" selected>5s</option>
        <option value="10">10s</option>
        <option value="20">20s</option>
      </select>
      <label>Window:</label>
      <select id="ble-window" title="Max notifications in-flight (credit window)">
        <option value="2">2</option>
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
      <button class="btn-ble" id="ble-bench" onclick="bleBench()" disabled>Benchmark</button>
    </div>
    <div class="progress-bar"><div class="fill ble" id="ble-progress"></div></div>
    <div class="result-box" id="ble-result">
      <div style="color: var(--text-dim); font-size: 0.8rem;">Connect and run benchmark</div>
    </div>
  </div>

  <!-- USB Card -->
  <div class="card usb">
    <h2><span class="dot" id="usb-dot"></span> USB</h2>
    <div class="status-line" id="usb-status">Not connected</div>
    <div class="btn-row">
      <button class="btn-usb" id="usb-webusb-connect" onclick="webusbConnect()" title="Works on Android Chrome">WebUSB</button>
      <button class="btn-usb" id="usb-serial-connect" onclick="usbSerialConnect()" title="Desktop Chrome only" style="opacity:0.7">Serial</button>
      <button class="btn-outline" id="usb-disconnect" onclick="usbDisconnect()" disabled>Disconnect</button>
      <button class="btn-outline" id="usb-ping" onclick="usbPing()" disabled>Ping</button>
      <button class="btn-outline" id="usb-info" onclick="usbInfo()" disabled>Info</button>
    </div>
    <div class="bench-config">
      <label>Duration:</label>
      <select id="usb-secs">
        <option value="3">3s</option>
        <option value="5" selected>5s</option>
        <option value="10">10s</option>
        <option value="20">20s</option>
      </select>
      <button class="btn-usb" id="usb-bench" onclick="usbBench()" disabled>Benchmark</button>
    </div>
    <div class="progress-bar"><div class="fill usb" id="usb-progress"></div></div>
    <div class="result-box" id="usb-result">
      <div style="color: var(--text-dim); font-size: 0.8rem;">WebUSB (Android) or Serial (desktop)</div>
    </div>
  </div>
</div>

<!-- Results History -->
<div class="results-history" id="history-section" style="display:none">
  <h3>Results History</h3>
  <table class="history-table">
    <thead><tr><th>Transport</th><th>Size</th><th>Time</th><th>Speed</th><th>Verified</th></tr></thead>
    <tbody id="history-body"></tbody>
  </table>
</div>

<!-- Log -->
<div class="log-panel">
  <h3>Log <button class="btn-outline" onclick="clearLog()" style="font-size:0.7rem;padding:0.15rem 0.5rem;">Clear</button></h3>
  <div id="log"></div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const SERVICE_UUID = 'a0e1f2d3-4b5c-6d7e-8f90-a1b2c3d4e5f6';
const TX_CHAR_UUID = 'a0e1f2d3-4b5c-6d7e-8f90-a1b2c3d4e5f7';
const RX_CHAR_UUID = 'a0e1f2d3-4b5c-6d7e-8f90-a1b2c3d4e5f8';

// ── BLE State ────────────────────────────────────────────────────────────────
let bleDevice = null, bleServer = null, bleTxChar = null, bleRxChar = null;
let bleBenchActive = false, bleBenchReceived = 0, bleBenchStart = 0;
let bleBenchVerifyErrors = 0, bleBenchSecs = 5;
let bleWindow = 10, bleCreditsGranted = 0, bleNotifsReceived = 0;

// ── USB State (shared between WebUSB and Web Serial) ─────────────────────────
let usbMode = null; // 'webusb' | 'serial' | null
// Web Serial
let serialPort = null, serialReader = null, serialWriter = null;
// WebUSB
let webusbDevice = null, webusbEpIn = null, webusbEpOut = null, webusbIfaceNum = -1;
// Shared bench state
let usbBenchActive = false, usbBenchReceived = 0, usbBenchStart = 0;
let usbBenchVerifyErrors = 0, usbBenchSecs = 5;
let usbReadBuffer = new Uint8Array(0);

// History
const results = [];

// ── Logging ──────────────────────────────────────────────────────────────────
function log(msg, cls = '') {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString('en-AU', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = `[${ts}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

// ── Pattern verification ─────────────────────────────────────────────────────
function benchPattern(offset) { return ((offset * 7 + 13) & 0xFF); }

function verifyChunk(data, globalOffset) {
  let errors = 0;
  for (let i = 0; i < data.length; i++) {
    if (data[i] !== benchPattern(globalOffset + i)) {
      errors++;
      if (errors <= 3) log(`verify fail @ ${globalOffset+i}: 0x${data[i].toString(16)} != 0x${benchPattern(globalOffset+i).toString(16)}`, 'log-warn');
    }
  }
  return errors;
}

// ── API Detection ────────────────────────────────────────────────────────────
function checkAPIs() {
  const badges = document.getElementById('badges');
  const apis = [
    ['Bluetooth', !!navigator.bluetooth],
    ['WebUSB', !!navigator.usb],
    ['Web Serial', !!navigator.serial],
    ['HTTPS', !!window.isSecureContext],
  ];
  badges.innerHTML = apis.map(([name, ok]) =>
    `<span class="badge ${ok ? 'ok' : 'no'}">${ok ? '✓' : '✗'} ${name}</span>`
  ).join('');
}
checkAPIs();

// ── UI Helpers ───────────────────────────────────────────────────────────────
function setConnected(transport, connected) {
  document.getElementById(`${transport}-dot`).className = connected ? 'dot connected' : 'dot';
  document.getElementById(`${transport}-disconnect`).disabled = !connected;
  document.getElementById(`${transport}-ping`).disabled = !connected;
  document.getElementById(`${transport}-info`).disabled = !connected;
  document.getElementById(`${transport}-bench`).disabled = !connected;
  if (transport === 'ble') {
    document.getElementById('ble-connect').disabled = connected;
  } else if (transport === 'usb') {
    document.getElementById('usb-webusb-connect').disabled = connected;
    document.getElementById('usb-serial-connect').disabled = connected;
  }
}

function showResult(transport, kBps, detail, verified) {
  const box = document.getElementById(`${transport}-result`);
  box.innerHTML = `
    <div class="big-number ${transport}">${kBps.toFixed(1)}<span class="unit">kB/s</span></div>
    <div class="detail">${detail}</div>
    ${verified !== undefined ? `<div class="detail" style="color:${verified ? 'var(--accent-usb)' : 'var(--accent-err)'}">
      ${verified ? '✓ Data verified' : '✗ Verification errors'}</div>` : ''}
  `;
}

function setProgress(transport, pct) {
  document.getElementById(`${transport}-progress`).style.width = `${Math.min(100, pct)}%`;
}

function addHistory(transport, bytes, elapsed, kBps, verified) {
  results.push({transport, bytes, elapsed, kBps, verified});
  document.getElementById('history-section').style.display = '';
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="color:var(--accent-${transport})">${transport.toUpperCase()}</td>
    <td>${formatBytes(bytes)}</td>
    <td>${(elapsed/1000).toFixed(2)}s</td>
    <td>${kBps.toFixed(1)} kB/s</td>
    <td style="color:${verified ? 'var(--accent-usb)' : 'var(--accent-err)'}">${verified ? '✓' : '✗'}</td>
  `;
  document.getElementById('history-body').prepend(tr);
}

function formatBytes(b) {
  if (b >= 1048576) return (b/1048576).toFixed(1) + ' MB';
  if (b >= 1024) return (b/1024).toFixed(0) + ' KB';
  return b + ' B';
}


// ═══════════════════════════════════════════════════════════════════════════════
// BLE
// ═══════════════════════════════════════════════════════════════════════════════

async function bleConnect() {
  if (!navigator.bluetooth) { log('Web Bluetooth not available', 'log-err'); return; }
  try {
    log('Requesting BLE device...', 'log-ble');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });
    bleDevice.addEventListener('gattserverdisconnected', () => {
      log('BLE disconnected', 'log-ble');
      setConnected('ble', false);
      document.getElementById('ble-status').textContent = 'Disconnected';
      bleBenchActive = false;
    });
    log(`Connecting to ${bleDevice.name}...`, 'log-ble');
    bleServer = await bleDevice.gatt.connect();
    const service = await bleServer.getPrimaryService(SERVICE_UUID);
    bleTxChar = await service.getCharacteristic(TX_CHAR_UUID);
    bleRxChar = await service.getCharacteristic(RX_CHAR_UUID);
    await bleTxChar.startNotifications();
    bleTxChar.addEventListener('characteristicvaluechanged', onBleNotification);
    setConnected('ble', true);
    document.getElementById('ble-status').textContent = `Connected: ${bleDevice.name}`;
    log(`BLE connected to ${bleDevice.name}`, 'log-ble');
  } catch (e) {
    log(`BLE connect error: ${e.message}`, 'log-err');
  }
}

async function bleDisconnect() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
}

async function bleSendCmd(obj) {
  if (!bleRxChar) return;
  const data = new TextEncoder().encode(JSON.stringify(obj));
  await bleRxChar.writeValueWithoutResponse(data);
}

async function blePing() {
  window._blePingStart = performance.now();
  bleSendCmd({cmd: 'ping'});
}

async function bleInfo() { bleSendCmd({cmd: 'info'}); }

function onBleNotification(event) {
  const value = event.target.value;

  if (bleBenchActive) {
    const chunk = new Uint8Array(value.buffer);

    // Check for JSON control message
    if (chunk[0] === 0x7B) {
      try {
        const msg = JSON.parse(new TextDecoder().decode(chunk));
        handleBleControlMsg(msg);
        return;
      } catch(e) { /* data, not JSON */ }
    }

    // Benchmark data
    bleBenchVerifyErrors += verifyChunk(chunk, bleBenchReceived);
    bleBenchReceived += chunk.length;
    bleNotifsReceived++;

    // Receive-driven credit replenishment
    const inFlight = bleCreditsGranted - bleNotifsReceived;
    const replenish = bleWindow - inFlight;
    if (replenish > 0) {
      bleSendCmd({cmd: 'credit', n: replenish});
      bleCreditsGranted += replenish;
    }

    // Progress based on elapsed time
    const elapsed = performance.now() - bleBenchStart;
    const pct = Math.min(100, (elapsed / (bleBenchSecs * 1000)) * 100);
    setProgress('ble', pct);

    if (bleBenchReceived % 10240 < chunk.length) {
      const kBps = (bleBenchReceived / 1024) / (elapsed / 1000);
      document.getElementById('ble-status').textContent =
        `Bench: ${formatBytes(bleBenchReceived)} (${kBps.toFixed(0)} kB/s) inflight:${inFlight}`;
    }
    return;
  }

  // Control message outside bench
  try {
    const msg = JSON.parse(new TextDecoder().decode(value.buffer));
    handleBleControlMsg(msg);
  } catch(e) {
    log(`BLE raw: ${new TextDecoder().decode(value.buffer)}`, 'log-ble');
  }
}

function handleBleControlMsg(msg) {
  if (msg.resp === 'pong') {
    const rtt = window._blePingStart ? (performance.now() - window._blePingStart).toFixed(1) : '?';
    log(`BLE pong (RTT: ${rtt}ms, uptime: ${msg.uptime_ms}ms)`, 'log-ble');
  } else if (msg.resp === 'info') {
    log(`BLE info: MTU=${msg.ble_mtu}, payload=${msg.ble_payload}, heap=${msg.free_heap}`, 'log-ble');
    document.getElementById('ble-status').textContent =
      `Connected | MTU: ${msg.ble_mtu} | Payload: ${msg.ble_payload}B`;
  } else if (msg.resp === 'bench_start') {
    log(`BLE bench starting: payload=${msg.payload_size}B, ${msg.secs}s`, 'log-ble');
    bleBenchActive = true;
    bleBenchReceived = 0;
    bleBenchStart = performance.now();
    bleBenchVerifyErrors = 0;
    bleNotifsReceived = 0;
    bleCreditsGranted = 0;
    bleBenchSecs = msg.secs || 5;
    bleWindow = parseInt(document.getElementById('ble-window').value);
    bleSendCmd({cmd: 'credit', n: bleWindow});
    bleCreditsGranted = bleWindow;
  } else if (msg.resp === 'bench_done') {
    bleBenchActive = false;
    const clientElapsed = performance.now() - bleBenchStart;
    const kBps = (bleBenchReceived / 1024) / (clientElapsed / 1000);
    const detail = `${formatBytes(bleBenchReceived)} in ${(clientElapsed/1000).toFixed(2)}s | Device: ${msg.kBps} kB/s | Errors: ${bleBenchVerifyErrors}`;
    showResult('ble', kBps, detail, bleBenchVerifyErrors === 0);
    setProgress('ble', 100);
    addHistory('ble', bleBenchReceived, clientElapsed, kBps, bleBenchVerifyErrors === 0);
    log(`BLE done: ${kBps.toFixed(1)} kB/s, ${bleBenchVerifyErrors} errors`, 'log-ble');
    document.getElementById('ble-status').textContent = `Connected: ${bleDevice.name}`;
  } else if (msg.resp === 'error') {
    log(`BLE error: ${msg.msg}`, 'log-err');
  }
}

async function bleBench() {
  const secs = parseInt(document.getElementById('ble-secs').value);
  setProgress('ble', 0);
  log(`Starting BLE benchmark: ${secs}s, window=${document.getElementById('ble-window').value}`, 'log-ble');
  await bleSendCmd({cmd: 'bench', bytes: 0, secs: secs});
}


// ═══════════════════════════════════════════════════════════════════════════════
// USB — shared send/receive, two connect modes
// ═══════════════════════════════════════════════════════════════════════════════

// ── Shared USB send ──────────────────────────────────────────────────────────
async function usbSend(text) {
  const data = new TextEncoder().encode(text);
  if (usbMode === 'webusb' && webusbDevice && webusbDevice.opened) {
    await webusbDevice.transferOut(webusbEpOut.endpointNumber, data);
  } else if (usbMode === 'serial' && serialWriter) {
    await serialWriter.write(data);
  }
}

async function usbSendCmd(obj) { await usbSend(JSON.stringify(obj) + '\n'); }
async function usbSendAck() { await usbSend('{"cmd":"ack"}\n'); }

function usbPing() { window._usbPingStart = performance.now(); usbSendCmd({cmd: 'ping'}); }
function usbInfo() { usbSendCmd({cmd: 'info'}); }

async function usbBench() {
  const secs = parseInt(document.getElementById('usb-secs').value);
  setProgress('usb', 0);
  usbBenchSecs = secs;
  log(`Starting USB benchmark: ${secs}s (${usbMode})`, 'log-usb');
  await usbSendCmd({cmd: 'bench', bytes: 0, secs: secs});
}

// ── Shared USB data handler (fed by both WebUSB and Web Serial read loops) ──
function handleUsbRawData(incoming) {
  // Append to buffer
  const newBuf = new Uint8Array(usbReadBuffer.length + incoming.length);
  newBuf.set(usbReadBuffer);
  newBuf.set(incoming, usbReadBuffer.length);
  usbReadBuffer = newBuf;

  while (usbReadBuffer.length > 0) {
    // JSON control message?
    if (usbReadBuffer[0] === 0x7B) { // '{'
      const nlIdx = usbReadBuffer.indexOf(0x0A);
      if (nlIdx === -1) break; // Wait for newline
      const jsonBytes = usbReadBuffer.slice(0, nlIdx);
      usbReadBuffer = usbReadBuffer.slice(nlIdx + 1);
      try {
        handleUsbControlMsg(JSON.parse(new TextDecoder().decode(jsonBytes)));
      } catch(e) { /* skip */ }
      continue;
    }

    // Binary data frame: 'D' + 3-byte length + payload
    if (usbReadBuffer[0] !== 0x44) { // Not 'D'
      usbReadBuffer = usbReadBuffer.slice(1); // Skip garbage byte
      continue;
    }
    if (usbReadBuffer.length < 4) break;
    const len = (usbReadBuffer[1] << 16) | (usbReadBuffer[2] << 8) | usbReadBuffer[3];
    if (usbReadBuffer.length < 4 + len) break;

    const payload = usbReadBuffer.slice(4, 4 + len);
    usbReadBuffer = usbReadBuffer.slice(4 + len);

    if (usbBenchActive) {
      usbBenchVerifyErrors += verifyChunk(payload, usbBenchReceived);
      usbBenchReceived += payload.length;

      const elapsed = performance.now() - usbBenchStart;
      const pct = Math.min(100, (elapsed / (usbBenchSecs * 1000)) * 100);
      setProgress('usb', pct);

      if (usbBenchReceived % 51200 < payload.length) {
        const kBps = (usbBenchReceived / 1024) / (elapsed / 1000);
        document.getElementById('usb-status').textContent =
          `Bench: ${formatBytes(usbBenchReceived)} (${kBps.toFixed(0)} kB/s)`;
      }
    }

    // ACK to release next chunk
    usbSendAck();
  }
}

function handleUsbControlMsg(msg) {
  if (msg.resp === 'pong') {
    const rtt = window._usbPingStart ? (performance.now() - window._usbPingStart).toFixed(1) : '?';
    log(`USB pong (RTT: ${rtt}ms, uptime: ${msg.uptime_ms}ms, transport: ${msg.transport})`, 'log-usb');
  } else if (msg.resp === 'info') {
    log(`USB info: transport=${msg.transport}, webusb=${msg.webusb}, heap=${msg.free_heap}`, 'log-usb');
    document.getElementById('usb-status').textContent =
      `Connected (${usbMode}) | ${msg.transport}`;
  } else if (msg.resp === 'bench_start') {
    log(`USB bench starting: chunk=${msg.chunk_size}B, ${msg.secs}s`, 'log-usb');
    usbBenchActive = true;
    usbBenchReceived = 0;
    usbBenchStart = performance.now();
    usbBenchVerifyErrors = 0;
    usbBenchSecs = msg.secs || 5;
    usbReadBuffer = new Uint8Array(0);
  } else if (msg.resp === 'bench_done') {
    usbBenchActive = false;
    const clientElapsed = performance.now() - usbBenchStart;
    const kBps = (usbBenchReceived / 1024) / (clientElapsed / 1000);
    const detail = `${formatBytes(usbBenchReceived)} in ${(clientElapsed/1000).toFixed(2)}s | Device: ${msg.kBps} kB/s | Errors: ${usbBenchVerifyErrors}`;
    showResult('usb', kBps, detail, usbBenchVerifyErrors === 0);
    setProgress('usb', 100);
    addHistory('usb', usbBenchReceived, clientElapsed, kBps, usbBenchVerifyErrors === 0);
    log(`USB done: ${kBps.toFixed(1)} kB/s (${usbMode}), ${usbBenchVerifyErrors} errors`, 'log-usb');
    document.getElementById('usb-status').textContent = `Connected (${usbMode})`;
  } else if (msg.resp === 'error') {
    log(`USB error: ${msg.msg}`, 'log-err');
  }
}


// ── WebUSB Connect (Android Chrome) ──────────────────────────────────────────
async function webusbConnect() {
  if (!navigator.usb) { log('WebUSB not available', 'log-err'); return; }
  try {
    log('Requesting WebUSB device...', 'log-usb');
    webusbDevice = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x303A }] // Espressif
    });
    await webusbDevice.open();
    if (!webusbDevice.configuration) await webusbDevice.selectConfiguration(1);

    // Find vendor-class interface (0xFF)
    let vendorIface = null;
    for (const iface of webusbDevice.configuration.interfaces) {
      for (const alt of iface.alternates) {
        if (alt.interfaceClass === 0xFF) { vendorIface = iface; break; }
      }
      if (vendorIface) break;
    }
    if (!vendorIface) {
      log('No vendor interface. Firmware needs USB-OTG (TinyUSB) mode with USBVendor.', 'log-err');
      await webusbDevice.close();
      return;
    }

    await webusbDevice.claimInterface(vendorIface.interfaceNumber);
    webusbIfaceNum = vendorIface.interfaceNumber;

    const alt = vendorIface.alternates[0];
    webusbEpIn = null; webusbEpOut = null;
    for (const ep of alt.endpoints) {
      if (ep.direction === 'in') webusbEpIn = ep;
      if (ep.direction === 'out') webusbEpOut = ep;
    }
    if (!webusbEpIn || !webusbEpOut) {
      log('Missing bulk endpoints on vendor interface', 'log-err');
      await webusbDevice.close();
      return;
    }

    usbMode = 'webusb';
    setConnected('usb', true);
    document.getElementById('usb-status').textContent = `Connected (WebUSB)`;
    log(`WebUSB connected: ${webusbDevice.productName || 'ESP32-S3'}`, 'log-usb');
    webusbReadLoop();
  } catch (e) {
    log(`WebUSB error: ${e.message}`, 'log-err');
  }
}

async function webusbReadLoop() {
  try {
    while (webusbDevice && webusbDevice.opened) {
      const result = await webusbDevice.transferIn(webusbEpIn.endpointNumber, 16384);
      if (result.status === 'ok' && result.data.byteLength > 0) {
        handleUsbRawData(new Uint8Array(result.data.buffer));
      }
    }
  } catch(e) {
    if (e.name !== 'AbortError' && e.name !== 'NetworkError') {
      log(`WebUSB read error: ${e.message}`, 'log-err');
    }
  }
}


// ── Web Serial Connect (Desktop Chrome) ──────────────────────────────────────
async function usbSerialConnect() {
  if (!navigator.serial) { log('Web Serial not available (desktop Chrome only)', 'log-err'); return; }
  try {
    log('Requesting serial port...', 'log-usb');
    serialPort = await navigator.serial.requestPort({
      filters: [{ usbVendorId: 0x303A }]
    });
    await serialPort.open({ baudRate: 921600 });
    serialWriter = serialPort.writable.getWriter();
    serialReader = serialPort.readable.getReader();

    usbMode = 'serial';
    setConnected('usb', true);
    document.getElementById('usb-status').textContent = 'Connected (Web Serial)';
    log('Web Serial connected', 'log-usb');
    serialReadLoop();
  } catch (e) {
    log(`Serial error: ${e.message}`, 'log-err');
  }
}

async function serialReadLoop() {
  try {
    while (true) {
      const {value, done} = await serialReader.read();
      if (done) break;
      handleUsbRawData(value);
    }
  } catch(e) {
    if (e.name !== 'AbortError') log(`Serial read error: ${e.message}`, 'log-err');
  }
}


// ── USB Disconnect (both modes) ──────────────────────────────────────────────
async function usbDisconnect() {
  usbBenchActive = false;
  try {
    if (usbMode === 'serial') {
      if (serialReader) { await serialReader.cancel(); serialReader = null; }
      if (serialWriter) { serialWriter.releaseLock(); serialWriter = null; }
      if (serialPort) { await serialPort.close(); serialPort = null; }
    } else if (usbMode === 'webusb') {
      if (webusbDevice && webusbDevice.opened) {
        if (webusbIfaceNum >= 0) {
          try { await webusbDevice.releaseInterface(webusbIfaceNum); } catch(e) {}
        }
        await webusbDevice.close();
      }
      webusbDevice = null; webusbEpIn = null; webusbEpOut = null; webusbIfaceNum = -1;
    }
  } catch(e) { /* ignore */ }

  const prev = usbMode;
  usbMode = null;
  setConnected('usb', false);
  document.getElementById('usb-status').textContent = 'Disconnected';
  log(`USB disconnected (was: ${prev})`, 'log-usb');
}


// ── Init ─────────────────────────────────────────────────────────────────────
log('Moonshot Transport Test ready');
log(`Secure context: ${window.isSecureContext ? 'yes' : 'NO - need HTTPS'}`);
log(`Bluetooth: ${navigator.bluetooth ? 'yes' : 'no'} | WebUSB: ${navigator.usb ? 'yes' : 'no'} | Web Serial: ${navigator.serial ? 'yes' : 'no'}`);
